specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MarketplaceFeeManager
    network: optimism-sepolia
    source:
      address: "0xCD3e96AaE2B3BDaAb3B4893a67dF1580f051A20E"
      abi: MarketplaceFeeManager
      startBlock: 10
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FeeRecipientUpdated
        - FeeUpdated
        - FeesWithdrawn
        - MinimumFeeUpdated
        - OwnershipTransferred
        - Paused
        - Unpaused
      abis:
        - name: MarketplaceFeeManager
          file: ./abis/MarketplaceFeeManager.json
      eventHandlers:
        - event: FeeRecipientUpdated(address,address)
          handler: handleFeeRecipientUpdated
        - event: FeeUpdated(uint256,uint256)
          handler: handleFeeUpdated
        - event: FeesWithdrawn(address,uint256)
          handler: handleFeesWithdrawn
        - event: MinimumFeeUpdated(uint256,uint256)
          handler: handleMinimumFeeUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: Unpaused(address)
          handler: handleUnpaused
      file: ./src/marketplace-fee-manager.ts
