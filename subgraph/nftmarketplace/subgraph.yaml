specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MarketplaceFeeManager
    network: localhost
    source:
      address: "0x16F198988e12f9a9fE658c9C3316Ad89c1481Fe2"
      abi: MarketplaceFeeManager
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - MarketplaceFeeManagerFeeRecipientUpdated
        - FeeUpdated
        - FeesWithdrawn
        - MinimumFeeUpdated
        - MarketplaceFeeManagerOwnershipTransferred
        - MarketplaceFeeManagerPaused
        - MarketplaceFeeManagerUnpaused
      abis:
        - name: MarketplaceFeeManager
          file: ./abis/MarketplaceFeeManager.json
      eventHandlers:
        - event: FeeRecipientUpdated(address,address)
          handler: handleFeeRecipientUpdated
        - event: FeeUpdated(uint256,uint256)
          handler: handleFeeUpdated
        - event: FeesWithdrawn(address,uint256)
          handler: handleFeesWithdrawn
        - event: MinimumFeeUpdated(uint256,uint256)
          handler: handleMinimumFeeUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: Unpaused(address)
          handler: handleUnpaused
      file: ./src/marketplace-fee-manager.ts
  - kind: ethereum
    name: NFTCollectionFactory
    network: localhost
    source:
      address: "0x936348293e93b0d17A4e14049C9491F20ca48B79"
      abi: NFTCollectionFactory
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CollectionCreated
        - DeploymentFeeUpdated
        - NFTCollectionFactoryFeeRecipientUpdated
        - MaxCollectionsPerCreatorUpdated
        - NFTCollectionFactoryOwnershipTransferred
        - NFTCollectionFactoryPaused
        - NFTCollectionFactoryUnpaused
      abis:
        - name: NFTCollectionFactory
          file: ./abis/NFTCollectionFactory.json
      eventHandlers:
        - event: CollectionCreated(indexed address,indexed address,string,string,uint256)
          handler: handleCollectionCreated
        - event: DeploymentFeeUpdated(uint256,uint256)
          handler: handleDeploymentFeeUpdated
        - event: FeeRecipientUpdated(address,address)
          handler: handleFeeRecipientUpdated
        - event: MaxCollectionsPerCreatorUpdated(uint256,uint256)
          handler: handleMaxCollectionsPerCreatorUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: Unpaused(address)
          handler: handleUnpaused
      file: ./src/nft-collection-factory.ts
  
  - kind: ethereum
    name: Marketplace
    network: localhost
    source:
      address: "0x38447C3c56eE144dFd897559e59e6Bb2f92E5766"
      abi: Marketplace
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ItemListed
        - ItemSold
        - ListingCancelled
        - PaymentTokenUpdated
        - MinimumListingPriceUpdated
        - MarketplaceOwnershipTransferred
        - MarketplacePaused
        - MarketplaceUnpaused
      abis:
        - name: Marketplace
          file: ./abis/Marketplace.json
      eventHandlers:
        - event: ItemListed(indexed bytes32,indexed address,indexed address,uint256,uint256,address)
          handler: handleItemListed
        - event: ItemSold(indexed bytes32,indexed address,indexed address,address,uint256,uint256,address,uint256,uint256)
          handler: handleItemSold
        - event: ListingCancelled(indexed bytes32,indexed address,address,uint256)
          handler: handleListingCancelled
        - event: PaymentTokenUpdated(indexed address,bool)
          handler: handlePaymentTokenUpdated
        - event: MinimumListingPriceUpdated(uint256,uint256)
          handler: handleMinimumListingPriceUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: Unpaused(address)
          handler: handleUnpaused
      file: ./src/marketplace.ts
