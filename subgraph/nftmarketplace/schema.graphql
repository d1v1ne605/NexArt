# Aggregate Entities for Analytics
type MarketplaceStats @entity(immutable: false) {
  id: ID! # "marketplace-stats"
  totalVolume: BigInt! # Total trading volume in ETH wei
  totalSales: BigInt! # Total number of sales
  totalListings: BigInt! # Total number of listings
  totalCollections: BigInt! # Total number of collections created
}

type CollectionStats @entity(immutable: false) {
  id: Bytes! # collection address
  collection: Bytes! # collection address  
  totalVolume: BigInt! # Total volume for this collection
  totalSales: BigInt! # Total sales for this collection
  floorPrice: BigInt! # Lowest listing price
  totalSupply: BigInt! # Total NFTs minted
  creator: Bytes! # Collection creator
}
