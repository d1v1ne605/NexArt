version: "3"
services:
  graph-node:
    platform: linux/amd64 # Use this line if you use macbook, remove it if you use window or linux
    image: graphprotocol/graph-node
    container_name: graph-node
    depends_on:
      - ipfs
      - postgres
    ports:
      - "8000:8000" # GraphQL API
      - "8001:8001" # GraphiQL UI
      - "8020:8020" # Admin
      - "8030:8030" # Indexer status
      - "8040:8040" # Metrics
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "ganache:http://host.docker.internal:7545"
      GRAPH_LOG: info
    networks:
      - graph

  ipfs:
    platform: linux/amd64
    image: ipfs/kubo:v0.17.0
    container_name: ipfs
    ports:
      - "5001:5001"
    volumes:
      - ./data/ipfs:/data/ipfs
    networks:
      - graph

  postgres:
    platform: linux/amd64
    image: postgres:14
    container_name: postgres
    ports:
      - "5432:5432"
    command:
      [
        "postgres",
        "-cshared_preload_libraries=pg_stat_statements",
        "-cmax_connections=200",
      ]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB:
        graph-node
      # FIXME: remove this env. var. which we shouldn't need. Introduced by
      # <https://github.com/graphprotocol/graph-node/pull/3511>, maybe as a
      # workaround for https://github.com/docker/for-mac/issues/6270?
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - graph

networks:
  graph:
    driver: bridge
