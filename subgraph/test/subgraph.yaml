specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Counter
    network: ganache
    source:
      address: "0x8aB215541656867Fd7c2689060E17E8A73bb44D2"
      abi: Counter
      startBlock: 7
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Increment
      abis:
        - name: Counter
          file: ./abis/Counter.json
      eventHandlers:
        - event: Increment(uint256)
          handler: handleIncrement
      file: ./src/counter.ts
